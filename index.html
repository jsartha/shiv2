<!DOCTYPE html>
<html>
<head>

    <title>jQuery Mobile Website</title>

    <!-- jQuery Mobile CSS -->
    <link rel="stylesheet"
    href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

    <!-- jQuery Library -->
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>

    <!-- jQuery Mobile JS -->
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>





    <!-- Simple CSS -->
    <style>

        body{
            font-family: Arial;
        }

        .custom-content{
            text-align: center;
            padding: 20px;
        }

        .custom-content h2{
            color: blue;
        }

        .custom-content p{
            color: green;
            font-size: 18px;
        }

        .custom-footer{
            background: black !important;
            color: white !important;
            text-align: center;
        }

    </style>

</head>

<body>





    <!-- Home Page -->
    <div data-role="page" id="home">

        <!-- Header -->
        <div data-role="header">
            <h1>My Mobile Site</h1>
        </div>





        <!-- Content -->
        <div data-role="content" class="custom-content">

            <h2>Welcome Student</h2>

            <p>This is simple jQuery Mobile website with CSS.</p>

            <a href="#about"
               class="ui-btn ui-corner-all ui-shadow">
               About Page
            </a>

        </div>





        <!-- Footer -->
        <div data-role="footer" class="custom-footer">
            <h4>Simple Footer</h4>
        </div>

    </div>







    <!-- About Page -->
    <div data-role="page" id="about">

        <!-- Header -->
        <div data-role="header">
            <h1>About</h1>
        </div>





        <!-- Content -->
        <div data-role="content" class="custom-content">

            <h2>About Website</h2>

            <p>Website created using jQuery Mobile and CSS.</p>

            <a href="#home"
               class="ui-btn ui-corner-all ui-shadow">
               Back Home
            </a>

        </div>





        <!-- Footer -->
        <div data-role="footer" class="custom-footer">
            <h4>Thank You</h4>
        </div>

    </div>

</body>
</html>
