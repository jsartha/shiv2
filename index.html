<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            display:flex;
            font-family:Arial;
        }

        /* Sidebar */

        .sidebar{
            width:200px;
            height:100vh;
            background:blue;
            color:white;
            padding:20px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            margin:15px 0;
        }

        /* Main */

        .main{
            flex:1;
            padding:20px;
            background:#f2f2f2;
        }

        /* Cards */

        .card-box{
            background:white;
            padding:20px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 0 5px gray;
        }

        /* Statistics */

        .stats{
            background:white;
            padding:20px;
            margin-top:20px;
            border-radius:10px;
            box-shadow:0 0 5px gray;
        }

    </style>

</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>Dashboard</h2>

        <a href="#">Home</a>

        <a href="#">Students</a>

        <a href="#">Courses</a>

        <a href="#">Statistics</a>

    </div>

    <!-- Main -->

    <div class="main">

        <h2>Admin Dashboard</h2>

        <!-- Cards -->

        <div class="row">

            <div class="col-md-4">

                <div class="card-box">

                    <h3>1200</h3>

                    <p>Total Students</p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card-box">

                    <h3>25</h3>

                    <p>Total Courses</p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card-box">

                    <h3>90%</h3>

                    <p>Placement</p>

                </div>

            </div>

        </div>

        <!-- Statistics -->

        <div class="stats">

            <h3>Statistics</h3>

            <p>Attendance</p>

            <div class="progress mb-3">

                <div class="progress-bar bg-success"
                style="width:80%">
                    80%
                </div>

            </div>

            <p>Exam Result</p>

            <div class="progress mb-3">

                <div class="progress-bar bg-primary"
                style="width:70%">
                    70%
                </div>

            </div>

            <p>Assignments</p>

            <div class="progress">

                <div class="progress-bar bg-danger"
                style="width:60%">
                    60%
                </div>

            </div>

        </div>

    </div>

</body>

</html>
